# Dependabot configuration.
# - Daily for github-actions (small surface, easy to review).
# - Weekly for the Python ecosystem; group minor + patch to limit PR churn.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps)"
    groups:
      python-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
