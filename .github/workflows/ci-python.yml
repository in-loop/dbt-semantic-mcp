# Python language overlay for CI.

name: ci-python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-python-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: python (${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29  # v4.1.7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --all-extras --frozen

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format --check)
        run: uv run ruff format --check .

      - name: Type check (pyright)
        run: uv run pyright

      - name: dbt build (seeds, models, tests)
        run: uv run dbt build
        working-directory: warehouse

      - name: Validate semantic layer
        run: uv run mf validate-configs
        working-directory: warehouse

      # IF TEST_DISCIPLINE >= pragmatic:
      - name: Run tests
        run: uv run pytest -ra

      # IF TEST_DISCIPLINE >= strict:
      # - name: Coverage (gate >= 80%)
      #   run: uv run pytest --cov=src --cov-fail-under=80

      - name: Audit dependencies
        run: uv run pip-audit
