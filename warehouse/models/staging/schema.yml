version: 2

models:
  - name: stg_customers
    columns:
      - name: customer_id
        tests: [unique, not_null]
      - name: region
        tests:
          - accepted_values:
              arguments:
                values: [midwest, northeast, south, west]
      - name: segment
        tests:
          - accepted_values:
              arguments:
                values: [smb, mid_market, enterprise]
  - name: stg_products
    columns:
      - name: product_id
        tests: [unique, not_null]
      - name: category
        tests:
          - accepted_values:
              arguments:
                values: [sensors, controllers, harnesses, actuators, displays, fasteners]
  - name: stg_orders
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: status
        tests:
          - accepted_values:
              arguments:
                values: [completed, returned, cancelled]
  - name: stg_order_items
    columns:
      - name: order_item_id
        tests: [unique, not_null]
      - name: order_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id
  - name: stg_shipments
    columns:
      - name: shipment_id
        tests: [unique, not_null]
      - name: order_id
        tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
