version: 2

seeds:
  - name: raw_products
    description: Synthetic product catalog (generated by scripts/generate_seed.py, RNG seed 42).
    config:
      column_types:
        product_id: integer
        product_name: varchar
        category: varchar
        unit_cost: double
        unit_price: double
  - name: raw_customers
    description: Synthetic customers.
    config:
      column_types:
        customer_id: integer
        customer_name: varchar
        region: varchar
        segment: varchar
        signup_date: date
  - name: raw_orders
    description: Synthetic orders, 2024-01-01 through 2025-12-31.
    config:
      column_types:
        order_id: integer
        customer_id: integer
        order_date: date
        status: varchar
        promised_ship_date: date
  - name: raw_order_items
    description: Synthetic order lines (1-5 per order).
    config:
      column_types:
        order_item_id: integer
        order_id: integer
        product_id: integer
        quantity: integer
        unit_price: double
        discount: double
  - name: raw_shipments
    description: Synthetic shipments; cancelled orders have none.
    config:
      column_types:
        shipment_id: integer
        order_id: integer
        shipped_date: date
